<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">SmoothActions</h1>
    <p class="subtitle">One‑click automations</p>

    <div class="actions">
      <button id="copyCode" class="action-btn">
        <span>:P</span> Copy All Code Blocks
      </button>

      <button id="copyText" class="action-btn">
        <span>TXT</span> Copy Visible Text
      </button>

      <button id="extractLinks" class="action-btn">
        <span>:l</span> Extract Page Links
      </button>

      <button id="focusMode" class="action-btn">
        <span>-_-</span> Toggle Focus Mode
      </button>

      <button id="readAloud" class="action-btn">
        <span>:D</span> Read Page Aloud
      </button>

      <button id="cleanUrl" class="action-btn">
        <span>>:0</span> Clean URL
      </button>

      <button id="autoScroll" class="action-btn">
        <span>?!</span> Auto Scroll
      </button>

      <button id="downloadImages" class="action-btn">
        <span>;></span> Download Images
      </button>
    </div>

    <div class="footer">
      <a href="settings.html" target="_blank" class="footer-link">O_0 Settings</a>
      <span>Made by Jishnu</span>
      <span>:3 About</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
